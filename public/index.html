<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XENO XD V2 - WhatsApp Pairing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="description" content="Securely pair your WhatsApp bot with XENO XD V2 using QR Code or Pairing Code.">
</head>

<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-text">XENO XD <span class="v2">V2</span></span>
            </div>
            <h1>WhatsApp Pairing</h1>
            <p>Connect your account to start the bot session.</p>
        </header>

        <main>
            <div id="method-selector" class="card fade-in">
                <h2>Choose Pairing Method</h2>
                <div class="methods">
                    <button id="btn-qr" class="method-btn">
                        <div class="icon">QR</div>
                        <span>QR Code</span>
                        <small>Scan with WhatsApp Web</small>
                    </button>
                    <button id="btn-code" class="method-btn">
                        <div class="icon">123</div>
                        <span>Pairing Code</span>
                        <small>Enter phone number</small>
                    </button>
                </div>
            </div>

            <div id="phone-input-section" class="card hidden">
                <h2>Enter Phone Number</h2>
                <p>Include country code (e.g., 919645991937)</p>
                <div class="input-group">
                    <input type="text" id="phone-number" placeholder="Enter number..." autocomplete="off">
                    <button id="btn-submit-phone">Generate Code</button>
                </div>
                <button class="back-link">Back to methods</button>
            </div>

            <div id="pairing-display" class="card hidden">
                <div id="status-message">Initializing...</div>
                <div id="qr-container" class="hidden">
                    <img id="qr-img" src="" alt="QR Code">
                </div>
                <div id="code-container" class="hidden">
                    <div class="pairing-code" id="display-code">--------</div>
                </div>
                <div id="loading-spinner" class="spinner"></div>
                <div id="success-box" class="hidden">
                    <div class="success-icon">✓</div>
                    <h3>Connected!</h3>
                    <p>Your session ID has been sent to your WhatsApp.</p>
                    <textarea id="session-output" readonly></textarea>
                    <button id="btn-copy">Copy Session ID</button>
                </div>
                <button class="back-link">Cancel</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 XENO XD V2. All rights reserved.</p>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>

</html>
